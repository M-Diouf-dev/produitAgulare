<div class="container-fluid py-4">
    <div class="col mb-3 text-center">
        <h2 class="btn btn-primary">Ajouter un produit</h2>
    </div>
    <form #ajoutForm="ngForm" class="col-md-6 bg-light p-4 rounded shadow mx-auto" (ngSubmit)="ajouterProduit()">

        <div class="mb-3">
            <label for="nom" class="form-label">Nom du produit</label>
            <input type="text" class="form-control" id="nom" name="nom" placeholder="Entrer le nom du produit"
                [(ngModel)]="nouveauProduit.nom ">
        </div>
        <div class="mb-3">
            <label for="prix" class="form-label">Prix</label>
            <input type="number" class="form-control" id="prix" name="prix" placeholder="Entrer le prix du produit"
                [(ngModel)]="nouveauProduit.prix">
        </div>
        <div class="mb-3">
            <label for="stock" class="form-label">Stock</label>
            <input type="number" class="form-control" id="stock" name="stock" placeholder="Entrer le stock du produit"
                [(ngModel)]="nouveauProduit.stock">
        </div>
        <div class="mb-3">
            <label for="actif" class="form-label">Actif</label>
            <select class="form-select" id="actif" name="actif" [(ngModel)]="nouveauProduit.actif">
                <option value="true">Oui</option>
                <option value="false">Non</option>
            </select>
        </div>
        <div class="mb-3">
            <label for="categorie" class="form-label">Catégorie</label>
            <select class="form-select" id="categorie" name="categorie" [(ngModel)]="nouveauProduit.categorie">
                <option value=""> </option> 
                    @for (categorie of categories;track categorie) {
                <option [value]="categorie">{{ categorie }}</option>
                }
                
            </select>
        </div>
        <div class="mb-3">
            <label for="description" class="form-label">Description</label>
            <textarea class="form-control" id="description" rows="3" placeholder="Entrer la description du produit" name="description" [(ngModel)]="nouveauProduit.description"></textarea>
        </div>
        <div class="d-flex justify-content-center ">
            <button type="submit" class="btn btn-primary">Ajouter</button>
            <a routerLink="/" class="btn btn-secondary ms-2">Annuler</a>
        </div>
    </form>
</div>
