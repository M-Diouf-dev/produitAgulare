<div class="container-fluid py-4">
    <div class="col mb-3 text-center">
        <h2 class="btn btn-primary">Modifier un produit</h2>
    </div>
    <form #ajoutForm="ngForm" class="col-md-6 bg-light p-4 rounded shadow mx-auto" (ngSubmit)="modifierProduit()">

        <div class="mb-3">
            <label for="nom" class="form-label">Nom du produit</label>
            <input type="text" class="form-control" id="nom" name="nom" value="{{ produitAModifier?.nom }}"
                [(ngModel)]="produitAModifier.nom ">
        </div>
        <div class="mb-3">
            <label for="prix" class="form-label">Prix</label>
            <input type="number" class="form-control" id="prix" name="prix" value="{{ produitAModifier?.prix }}"
                [(ngModel)]="produitAModifier.prix">
        </div>
        <div class="mb-3">
            <label for="stock" class="form-label">Stock</label>
            <input type="number" class="form-control" id="stock" name="stock" value="{{ produitAModifier?.stock }}"
                [(ngModel)]="produitAModifier.stock">
        </div>
        <div class="mb-3">
            <label for="actif" class="form-label">Actif</label>
            <select class="form-select" id="actif" name="actif" [(ngModel)]="produitAModifier.actif"
                value="{{ produitAModifier?.actif }}">
                <option value="true">Oui</option>
                <option value="false">Non</option>
            </select>
        </div>
        <div class="mb-3">
            <label for="categorie" class="form-label">Catégorie</label>
            <select class="form-select" id="categorie" name="categorie" [(ngModel)]="produitAModifier.categorie"
                value="{{ produitAModifier?.categorie }}">
                <option value=""> </option>
                @for (categorie of categories;track categorie) {
                <option [value]="categorie">{{ categorie }}</option>
                }



            </select>
        </div>
        <!-- <div class="mb-3">
            <label for="description" class="form-label">Description</label>
            <textarea class="form-control" id="description" rows="3" name="description"
                [(ngModel)]="produitAModifier.description"></textarea>
        </div> -->
        <div class="d-flex justify-content-center ">
            <button type="submit" class="btn btn-primary">Ajouter</button>
            <a routerLink="/" class="btn btn-secondary ms-2">Annuler</a>
        </div>
    </form>
</div>
